name: Publish

on:
  release:
    types: [published]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            tox-env: py310
          - python-version: "3.11"
            tox-env: py311
          - python-version: "3.12"
            tox-env: py312
          - python-version: "3.13"
            tox-env: py313
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - run: uv run tox -e ${{ matrix.tox-env }}

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv run tox -e lint

  publish-testpypi:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    environment: testpypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - name: Set dev version from timestamp
        run: |
          VERSION=$(grep '^version' pyproject.toml | sed 's/.*"\(.*\)"/\1/')
          TIMESTAMP=$(date -u +%Y%m%d%H%M%S)
          DEV_VERSION="${VERSION}.dev${TIMESTAMP}"
          sed -i "s/^version = \".*\"/version = \"${DEV_VERSION}\"/" pyproject.toml
          echo "Publishing ${DEV_VERSION} (branch: ${{ github.event.pull_request.head.ref }}, commit: ${{ github.event.pull_request.head.sha }})"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: github.event_name == 'release'
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
